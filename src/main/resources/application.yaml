spring:
  application:
    name: stocktracker
  data:
    mongodb:
      host: localhost
      port: 27017
      database: stocktracker
    redis:
      host: localhost
      port: 6379
  cache:
    redis:
      time-to-live: 60000

stock:
  client:
    brapi:
      url: https://brapi.dev/api/quote
      token: ${BRAPI_API_TOKEN}
